<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Rhythm — daily check-in</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="brand">r<i>h</i>ythm</div>
        <div id="date" class="date"></div>
      </header>
      <section class="layout">
        <article class="card">
          <div class="today-head">
            <div>
              <h1>Small actions, kept gently.</h1>
              <p class="sub">
                Pick up where you are. Today only needs your next step.
              </p>
            </div>
            <span id="count" class="count">0 / 3</span>
          </div>
          <div id="habits" class="habit-list"></div>
          <button id="add" class="under">+ Add habit</button
          ><button id="habitSettings" class="under manage">
            Manage habits
          </button>
        </article>
        <aside class="right">
          <article class="card pulse">
            <h2>Your pulse</h2>
            <div class="pulse-grid">
              <div class="metric">
                <b id="streak">0</b><span>current-day streak</span>
              </div>
              <div class="metric">
                <b id="monthPercent">0%</b><span>this month</span>
              </div>
            </div>
          </article>
          <article class="card">
            <h2>How are you arriving?</h2>
            <div class="mood" id="mood">
              <button>🌧️</button><button>🌿</button><button>☀️</button
              ><button>✨</button>
            </div>
          </article>
        </aside>
        <article class="card month">
          <div class="month-top">
            <h2 id="monthName">Month</h2>
            <div class="nav">
              <button id="prev">‹</button><button id="next">›</button>
            </div>
          </div>
          <div class="week">
            <span>M</span><span>T</span><span>W</span><span>T</span
            ><span>F</span><span>S</span><span>S</span>
          </div>
          <div id="calendar" class="grid"></div>
          <div class="legend">
            <span>less</span
            ><span class="squares"
              ><i class="sq"></i><i class="sq"></i><i class="sq"></i
              ><i class="sq"></i></span
            ><span>more</span>
          </div>
        </article>
        <article class="card journal">
          <div class="row">
            <h2>Today’s page</h2>
            <span class="date">Saved automatically</span>
          </div>
          <label class="date" for="remarks"
            >Remark, win, or a note to yourself</label
          ><textarea
            class="field"
            id="remarks"
            placeholder="How did today feel? What would you like to remember?"
          ></textarea>
          <div class="delayed">
            <input
              id="delayedInput"
              placeholder="Add a delayed work or follow-up"
            /><button id="delayedAdd">Add</button>
          </div>
          <div id="delayedList" class="delayed-list"></div>
        </article>
      </section>
    </main>
    <div id="modal" class="modal" hidden>
      <div class="modal-box">
        <h2>Manage habits</h2>
        <div id="habitManager"></div>
        <div class="modal-actions">
          <button id="closeModal">Close</button
          ><button id="newHabit" class="primary">+ New habit</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
